<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LabSync Pro — Hasta Portalı</title>
    <meta name="description" content="Lab test sonuçlarınızı görüntüleyin.">
    <meta name="theme-color" content="#060a14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/biyosera_logo.png">
    <link rel="stylesheet" href="css/style-v2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { overflow: auto; height: auto; position: relative !important; overscroll-behavior: auto; padding-bottom: 40px; }
        body::before, body::after { position: fixed; }

        /* Portal-specific */
        .portal-hero { 
            text-align: center; 
            padding: 40px 20px 20px; 
            position: relative; 
            z-index: 1; 
        }
        .portal-hero img { height: 48px; object-fit: contain; filter: brightness(1.1); }
        .portal-hero .app-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-white);
            letter-spacing: 3px;
            margin-top: 8px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        .portal-hero .app-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* Vital Gauges Grid */
        .vitals-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            padding: 0 4px;
        }
        .vitals-header i { color: var(--text-white); font-size: 14px; }
        .vitals-header span {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-white);
            letter-spacing: 0.5px;
        }

        /* Health Overview Card */
        .health-overview {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 16px;
            text-align: center;
            backdrop-filter: blur(16px);
            position: relative;
            overflow: hidden;
        }
        .health-overview::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--text-white), var(--neon-green), var(--neon-purple));
        }

        /* SpO2-style Wave Effect */
        .wave-effect {
            position: relative;
            height: 40px;
            margin: 12px 0;
            overflow: hidden;
            border-radius: 8px;
        }
        .wave-effect::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                transparent 0px,
                rgba(255, 51, 102, 0.6) 2px,
                transparent 4px,
                rgba(255, 255, 255, 0.4) 6px,
                transparent 8px
            );
            animation: waveScroll 3s linear infinite;
        }
        @keyframes waveScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Test Result Cards */
        .test-result-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            margin-bottom: 12px;
            overflow: hidden;
            backdrop-filter: blur(16px);
        }
        .test-result-header {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-subtle);
            cursor: pointer;
        }
        .test-result-header:active { background: rgba(255, 255, 255, 0.03); }
        .test-result-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-white);
        }
        .test-result-body { padding: 16px; }
        .test-param-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .test-param-row:last-child { border-bottom: none; }
        .test-param-name { font-size: 13px; color: var(--text-primary); font-weight: 500; }
        .test-param-value { font-size: 14px; font-weight: 700; font-family: 'JetBrains Mono', mono; }
        .test-param-ref { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

        /* Timeline */
        .portal-timeline {
            position: relative;
            padding-left: 24px;
        }
        .portal-timeline::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 0;
            bottom: 0;
            width: 1px;
            background: linear-gradient(to bottom, var(--text-white), transparent);
        }
        .portal-timeline-item {
            position: relative;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
        }
        .portal-timeline-item::before {
            content: '';
            position: absolute;
            left: -22px;
            top: 16px;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--text-white);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
        }
        .portal-timeline-date {
            font-size: 11px;
            color: var(--text-white);
            font-family: 'JetBrains Mono', mono;
            margin-bottom: 4px;
        }
        .portal-timeline-text {
            font-size: 13px;
            color: var(--text-primary);
        }

        @media (max-width: 480px) {
            .portal-hero { padding: 28px 16px 16px; }
            .portal-hero img { height: 40px; }
            .portal-login-card { padding: 28px 18px; }
        }
    </style>
</head>
<body>
    <div class="video-bg-container">
        <video autoplay loop muted playsinline class="video-bg">
            <source src="assets/bg-video-mobile.mp4" type="video/mp4">
        </video>
    </div>
    <div class="portal-wrapper">
        <!-- Hero -->
        <div class="portal-hero">
            <img src="assets/biyosera_logo_hz.png" alt="Biyosera">
            <div class="app-name">LABSYNC PRO</div>
            <div class="app-sub">Hasta Portalı</div>
        </div>

        <!-- Login Screen -->
        <div class="portal-login-container" id="portalLoginContainer">
            <div class="portal-login-card">
                <div style="width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:24px;color:#fff;box-shadow:var(--shadow-glow);">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h2>Sonuçlarınızı Görüntüleyin</h2>
                <p>TC Kimlik numaranız ve adınız ile giriş yapın.</p>

                <div class="tabs" style="margin:0 auto 20px;justify-content:center;">
                    <button class="tab active" onclick="switchPortalTab('manual')" id="tabManual">Manuel Giriş</button>
                    <button class="tab" onclick="switchPortalTab('qr')" id="tabQR">QR Kod</button>
                </div>

                <div id="manualLoginForm">
                    <div class="form-group" style="margin-bottom:14px;text-align:left;">
                        <label class="form-label">TC Kimlik No</label>
                        <input type="text" class="form-control" id="portalTC" maxlength="11" placeholder="11 haneli TC kimlik numaranız" inputmode="numeric">
                    </div>
                    <div class="form-group" style="margin-bottom:20px;text-align:left;">
                        <label class="form-label">Ad Soyad</label>
                        <input type="text" class="form-control" id="portalName" placeholder="Adınız ve soyadınız">
                    </div>
                    <button class="btn btn-primary btn-lg" style="width:100%;" onclick="portalLogin()">
                        <i class="fas fa-sign-in-alt"></i> Giriş Yap
                    </button>
                </div>

                <div id="qrLoginForm" style="display:none;">
                    <p style="color:var(--text-secondary);font-size:13px;margin-bottom:16px;">Size verilen QR kodu kameranıza gösterin.</p>
                    <button class="btn btn-primary btn-lg" style="width:100%;" onclick="startPortalQRScan()" id="portalScanBtn">
                        <i class="fas fa-camera"></i> Kamerayı Aç
                    </button>
                    <div id="portal-qr-reader" style="display:none;margin-top:16px;border-radius:12px;overflow:hidden;border:2px solid var(--text-white);"></div>
                </div>

                <div id="portalError" style="display:none;margin-top:16px;">
                    <div class="badge badge-danger" style="font-size:13px;padding:10px 20px;">
                        <i class="fas fa-exclamation-circle"></i> <span id="portalErrorText">Hata</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Results Dashboard -->
        <div class="portal-results" id="portalResultsContainer" style="display:none;">
            <!-- Patient Info Card -->
            <div class="portal-patient-info" id="portalPatientInfo"></div>

            <!-- Health Score -->
            <div class="health-overview" id="healthOverviewCard" style="display:none;">
                <div class="health-score-ring">
                    <svg viewBox="0 0 160 160">
                        <circle cx="80" cy="80" r="70" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="8"/>
                        <circle id="healthScoreCircle" cx="80" cy="80" r="70" fill="none" stroke="var(--text-white)" stroke-width="8"
                            stroke-linecap="round"
                            stroke-dasharray="439.82"
                            stroke-dashoffset="439.82"
                            style="transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset 2s cubic-bezier(0.4,0,0.2,1);"/>
                    </svg>
                    <div class="health-score-center">
                        <div class="score" id="healthScoreValue">—</div>
                        <div class="label">Sağlık Skoru</div>
                    </div>
                </div>
                <div style="font-size:12px;color:var(--text-secondary);" id="healthScoreDesc">Kontrol tamamlanma oranınız</div>
            </div>

            <!-- Completion Bar -->
            <div class="completion-bar-container" id="completionBarContainer" style="display:none;">
                <div class="completion-label">
                    <span>Kontrol Durumu</span>
                    <span id="completionPercent">0%</span>
                </div>
                <div class="completion-bar">
                    <div class="completion-bar-fill" id="completionBarFill" style="width: 0%;"></div>
                </div>
            </div>

            <!-- Vital Gauges -->
            <div id="vitalGaugesSection" style="display:none;margin-bottom:20px;">
                <div class="vitals-header">
                    <i class="fas fa-heartbeat"></i>
                    <span>Vital Göstergeler</span>
                </div>
                <div class="gauge-grid" id="vitalGaugesGrid"></div>
            </div>

            <!-- Missing Tests -->
            <div id="missingTestsSection" style="display:none;margin-bottom:20px;">
                <div class="vitals-header">
                    <i class="fas fa-clipboard-check"></i>
                    <span>Eksik Kontroller</span>
                </div>
                <div class="card">
                    <div class="card-body">
                        <div class="missing-tests-grid" id="missingTestsGrid"></div>
                    </div>
                </div>
            </div>

            <!-- Test Results -->
            <div id="portalTestResults"></div>

            <!-- Timeline -->
            <div id="timelineSection" style="display:none;margin-top:20px;">
                <div class="vitals-header">
                    <i class="fas fa-stream"></i>
                    <span>Zaman Çizelgesi</span>
                </div>
                <div class="portal-timeline" id="portalTimeline"></div>
            </div>

            <div style="text-align:center;margin-top:32px;padding-bottom:40px;">
                <button class="btn btn-secondary" onclick="portalLogout()">
                    <i class="fas fa-sign-out-alt"></i> Çıkış Yap
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/seed-data.js"></script>
    <script>
        // ═══ Particles ═══
        function initParticles() {
            const c = document.getElementById('particlesContainer');
            if (!c) return;
            const count = window.innerWidth < 768 ? 12 : 25;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (10 + Math.random() * 18) + 's';
                p.style.animationDelay = Math.random() * 8 + 's';
                p.style.width = (1 + Math.random() * 2) + 'px';
                p.style.height = p.style.width;
                const colors = ['var(--text-white)', 'var(--neon-purple)', 'var(--neon-green)'];
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.boxShadow = `0 0 ${3 + Math.random() * 5}px ${p.style.background}`;
                c.appendChild(p);
            }
        }
        initParticles();

        // ═══ Data Access ═══
        async function getDB() {
            if (window.loadFromSupabase) {
                const cloudDB = await window.loadFromSupabase();
                if (cloudDB && cloudDB.patients && cloudDB.patients.length > 0) return cloudDB;
            }

            let patients = JSON.parse(localStorage.getItem('labsync_patients') || '[]');
            
            // Critical fallback for cross-device QR scanning (when standalone device has no localStorage cache)
            if (patients.length === 0) {
                patients = [
                    { id:'P-240301', firstName:'Ahmet', lastName:'Yılmaz', tc:'10234567890', birthDate:'1988-05-14', gender:'Erkek', bloodType:'A Rh+' },
                    { id:'P-240302', firstName:'Mehmet', lastName:'Kaya', tc:'20345678901', birthDate:'1992-11-22', gender:'Erkek', bloodType:'O Rh+' },
                    { id:'P-240303', firstName:'Fatma', lastName:'Demir', tc:'30456789012', birthDate:'1995-03-08', gender:'Kadın', bloodType:'B Rh+' },
                    { id:'P-240304', firstName:'Ali', lastName:'Öztürk', tc:'40567890123', birthDate:'1985-07-30', gender:'Erkek', bloodType:'AB Rh-' },
                    { id:'P-240305', firstName:'Zeynep', lastName:'Arslan', tc:'50678901234', birthDate:'1990-12-17', gender:'Kadın', bloodType:'A Rh-' },
                    { id:'P-240306', firstName:'Mustafa', lastName:'Çelik', tc:'60789012345', birthDate:'1983-09-05', gender:'Erkek', bloodType:'O Rh-' },
                    { id:'P-240307', firstName:'Elif', lastName:'Şahin', tc:'70890123456', birthDate:'1993-01-25', gender:'Kadın', bloodType:'B Rh-' }
                ];
                const semenTests = [
                    { id:'SA-240301', patientId:'P-240301', date:'2026-03-05', result:'Oligozoospermi' },
                    { id:'SA-240302', patientId:'P-240302', date:'2026-03-08', result:'Normozoospermi' }
                ];
                const labTests = [
                    { id:'LT-240301', patientId:'P-240303', date:'2026-03-04', testType:'Hormon', status:'Sonuçlandı' },
                    { id:'LT-240302', patientId:'P-240302', date:'2026-03-06', testType:'Bulaşıcı', status:'Sonuçlandı' }
                ];
                return { patients, semenTests, ivfRecords: [], labTests, dnaTests: [] };
            }

            return {
                patients: patients,
                semenTests: JSON.parse(localStorage.getItem('labsync_semen') || '[]'),
                ivfRecords: JSON.parse(localStorage.getItem('labsync_ivf') || '[]'),
                labTests: JSON.parse(localStorage.getItem('labsync_labtests') || '[]'),
                dnaTests: JSON.parse(localStorage.getItem('labsync_dnatests') || '[]'),
            };
        }

        // ═══ Tab Switch ═══
        function switchPortalTab(tab) {
            document.getElementById('tabManual').classList.toggle('active', tab === 'manual');
            document.getElementById('tabQR').classList.toggle('active', tab === 'qr');
            document.getElementById('manualLoginForm').style.display = tab === 'manual' ? 'block' : 'none';
            document.getElementById('qrLoginForm').style.display = tab === 'qr' ? 'block' : 'none';
            document.getElementById('portalError').style.display = 'none';
        }

        // ═══ Text Normalizer ═══
        function normalizeStr(str) {
            if (!str) return '';
            return str.toLocaleLowerCase('tr-TR')
                .replace(/i̇/g, 'i').replace(/ı/g, 'i')
                .replace(/ö/g, 'o').replace(/ü/g, 'u')
                .replace(/ş/g, 's').replace(/ğ/g, 'g').replace(/ç/g, 'c')
                .replace(/\s+/g, '');
        }

        // ═══ Login ═══
        async function portalLogin() {
            const rawTc = document.getElementById('portalTC').value;
            const rawName = document.getElementById('portalName').value;
            const tc = rawTc.replace(/\s+/g, '');
            const nameSearch = normalizeStr(rawName);
            
            if (!tc || !nameSearch) { showPortalError('Lütfen TC ve Ad Soyad alanlarını doldurun.'); return; }
            
            const db = await getDB();
            const patient = db.patients.find(p => {
                const pTc = (p.tc || '').replace(/\s+/g, '');
                const pName = normalizeStr(`${p.firstName} ${p.lastName}`);
                return pTc === tc && pName.includes(nameSearch);
            });
            
            if (patient) { showPatientResults(patient); } 
            else { showPortalError('Eşleşen hasta bulunamadı. Bilgilerinizi kontrol edin.'); }
        }

        function showPortalError(msg) {
            document.getElementById('portalError').style.display = 'block';
            document.getElementById('portalErrorText').textContent = msg;
        }

        function portalLogout() {
            document.getElementById('portalLoginContainer').style.display = 'flex';
            document.getElementById('portalResultsContainer').style.display = 'none';
            document.getElementById('portalTC').value = '';
            document.getElementById('portalName').value = '';
            document.getElementById('portalError').style.display = 'none';
            history.replaceState(null, '', window.location.pathname);
        }

        function fmtDate(d) {
            if (!d) return '-';
            return new Date(d).toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        // ═══ SHOW PATIENT RESULTS ═══
        async function showPatientResults(patient) {
            const db = await getDB();
            document.getElementById('portalLoginContainer').style.display = 'none';
            document.getElementById('portalResultsContainer').style.display = 'block';

            const age = patient.birthDate ? Math.floor((new Date() - new Date(patient.birthDate)) / (365.25 * 86400000)) : '-';
            const initials = (patient.firstName[0] + patient.lastName[0]).toUpperCase();

            document.getElementById('portalPatientInfo').innerHTML = `
                <div class="portal-patient-avatar">${initials}</div>
                <div style="flex:1;">
                    <h2 style="font-size:20px;font-weight:700;color:var(--text-white);margin-bottom:4px;">${patient.firstName} ${patient.lastName}</h2>
                    <div style="font-size:12px;color:var(--text-secondary);display:flex;flex-wrap:wrap;gap:8px;">
                        <span><i class="fas fa-id-card" style="color:var(--text-white);margin-right:4px;"></i>${patient.id}</span>
                        <span><i class="fas fa-birthday-cake" style="color:var(--neon-purple);margin-right:4px;"></i>${age} yaş</span>
                        <span><i class="fas fa-venus-mars" style="color:var(--neon-green);margin-right:4px;"></i>${patient.gender || '-'}</span>
                        ${patient.bloodType ? `<span><i class="fas fa-tint" style="color:var(--neon-pink);margin-right:4px;"></i>${patient.bloodType}</span>` : ''}
                    </div>
                </div>
            `;

            const semenTests = db.semenTests.filter(t => t.patientId === patient.id);
            const ivfRecords = db.ivfRecords.filter(t => t.patientId === patient.id);
            const labTests = db.labTests.filter(t => t.patientId === patient.id);
            const dnaTests = db.dnaTests.filter(t => t.patientId === patient.id);
            const totalTests = semenTests.length + ivfRecords.length + labTests.length + dnaTests.length;

            // ─── Health Score ───
            renderHealthScore(totalTests, semenTests, labTests, dnaTests);

            // ─── Completion Bar ───
            renderCompletionBar(semenTests, labTests, dnaTests);

            // ─── Vital Gauges ───
            renderVitalGauges(semenTests, labTests);

            // ─── Missing Tests ───
            renderMissingTests(semenTests, labTests, dnaTests, ivfRecords);

            // ─── Test Results ───
            renderTestResults(semenTests, ivfRecords, labTests, dnaTests);

            // ─── Timeline ───
            renderTimeline(semenTests, ivfRecords, labTests, dnaTests);
        }

        // ═══ HEALTH SCORE ═══
        function renderHealthScore(totalTests, semen, lab, dna) {
            const card = document.getElementById('healthOverviewCard');
            if (totalTests === 0) { card.style.display = 'none'; return; }
            card.style.display = 'block';

            // Score based on test coverage
            const possibleCategories = 5; // semen, hormon, hemogram, bulaşıcı, dna
            let doneCategories = 0;
            if (semen.length > 0) doneCategories++;
            const labTypes = [...new Set(lab.map(l => l.testType))];
            doneCategories += Math.min(labTypes.length, 3);
            if (dna.length > 0) doneCategories++;
            const score = Math.round((doneCategories / possibleCategories) * 100);

            const circle = document.getElementById('healthScoreCircle');
            const circumference = 2 * Math.PI * 70;
            const offset = circumference * (1 - score / 100);

            let color = 'var(--neon-green)';
            if (score < 40) color = 'var(--neon-pink)';
            else if (score < 70) color = 'var(--neon-orange)';

            document.getElementById('healthScoreValue').textContent = score;
            document.getElementById('healthScoreDesc').textContent = score >= 70 ? 'Kontroller büyük ölçüde tamamlandı' : score >= 40 ? 'Bazı kontroller eksik' : 'Acil kontrol gerekli';
            
            setTimeout(() => {
                circle.style.strokeDashoffset = offset;
                circle.style.stroke = color;
            }, 300);
        }

        // ═══ COMPLETION BAR ═══
        function renderCompletionBar(semen, lab, dna) {
            const container = document.getElementById('completionBarContainer');
            const checklist = [
                { name: 'Semen Analizi', done: semen.length > 0 },
                { name: 'Hormon Paneli', done: lab.some(l => l.testType === 'Hormon') },
                { name: 'Hemogram', done: lab.some(l => l.testType === 'Hemogram') },
                { name: 'Bulaşıcı Hastalık', done: lab.some(l => l.testType === 'Bulaşıcı') },
                { name: 'Genetik Test', done: dna.length > 0 },
            ];
            const done = checklist.filter(c => c.done).length;
            const percent = Math.round((done / checklist.length) * 100);

            container.style.display = 'block';
            document.getElementById('completionPercent').textContent = `%${percent}`;
            setTimeout(() => {
                document.getElementById('completionBarFill').style.width = percent + '%';
            }, 500);
        }

        // ═══ VITAL GAUGES (Ring Style) ═══
        function renderVitalGauges(semenTests, labTests) {
            const section = document.getElementById('vitalGaugesSection');
            const grid = document.getElementById('vitalGaugesGrid');
            const gauges = [];

            // From latest semen test
            if (semenTests.length > 0) {
                const s = semenTests[semenTests.length - 1];
                if (s.concentration) gauges.push({ value: s.concentration, max: 100, color: '#00d4ff', label: 'Konsantrasyon', unit: 'M/ml' });
                if (s.progressiveMotility) gauges.push({ value: s.progressiveMotility, max: 100, color: '#a855f7', label: 'Motilite', unit: '%' });
                if (s.morphology) gauges.push({ value: s.morphology, max: 100, color: '#00ff88', label: 'Morfoloji', unit: '%' });
                if (s.volume) gauges.push({ value: s.volume, max: 6, color: '#ff8800', label: 'Hacim', unit: 'ml' });
            }

            // From latest lab test parameters
            if (labTests.length > 0) {
                const latest = labTests[labTests.length - 1];
                if (latest.parameters && latest.parameters.length > 0) {
                    latest.parameters.slice(0, 4).forEach(p => {
                        if (p.value && p.refMax) {
                            const flagColor = p.flag === 'Normal' ? '#00ff88' : p.flag === 'Yüksek' ? '#ff3366' : '#ff8800';
                            gauges.push({ 
                                value: parseFloat(p.value) || 0, 
                                max: parseFloat(p.refMax) * 1.5 || 100, 
                                color: flagColor, 
                                label: p.name, 
                                unit: p.unit || '' 
                            });
                        }
                    });
                }
            }

            if (gauges.length === 0) { section.style.display = 'none'; return; }
            section.style.display = 'block';

            grid.innerHTML = gauges.map((g, i) => {
                const radius = 38;
                const circ = 2 * Math.PI * radius;
                const percent = Math.min(g.value / g.max, 1);
                const offset = circ * (1 - percent);
                let status = 'normal', statusText = 'Normal';
                if (percent > 1.2 || percent < 0.2) { status = 'danger'; statusText = 'Anormal'; }
                else if (percent < 0.4) { status = 'warning'; statusText = 'Düşük'; }

                return `
                <div class="gauge-card">
                    <div class="gauge-ring" style="width:88px;height:88px;">
                        <svg viewBox="0 0 100 100">
                            <circle class="gauge-bg" cx="50" cy="50" r="${radius}"/>
                            <circle class="gauge-fill" cx="50" cy="50" r="${radius}"
                                stroke="${g.color}"
                                stroke-dasharray="${circ}"
                                stroke-dashoffset="${circ}"
                                data-offset="${offset}"/>
                        </svg>
                        <div class="gauge-value">
                            <span class="value" style="font-size:18px;color:${g.color};">${g.value}</span>
                            <span class="unit">${g.unit}</span>
                        </div>
                    </div>
                    <div class="gauge-label">${g.label}</div>
                    <div class="gauge-status ${status}">${statusText}</div>
                </div>`;
            }).join('');

            // Animate gauges
            setTimeout(() => {
                grid.querySelectorAll('.gauge-fill').forEach(el => {
                    el.style.strokeDashoffset = el.dataset.offset;
                });
            }, 400);
        }

        // ═══ MISSING TESTS ═══
        function renderMissingTests(semen, lab, dna, ivf) {
            const section = document.getElementById('missingTestsSection');
            const grid = document.getElementById('missingTestsGrid');

            const checks = [
                { name: 'Semen Analizi', desc: 'Sperm kalite değerlendirmesi', done: semen.length > 0, icon: 'fa-vial' },
                { name: 'Hormon Paneli', desc: 'FSH, LH, Testosteron, E2, Prolaktin', done: lab.some(l => l.testType === 'Hormon'), icon: 'fa-flask' },
                { name: 'Hemogram', desc: 'Tam kan sayımı', done: lab.some(l => l.testType === 'Hemogram'), icon: 'fa-tint' },
                { name: 'Bulaşıcı Hastalık', desc: 'HBsAg, Anti-HCV, HIV, VDRL', done: lab.some(l => l.testType === 'Bulaşıcı'), icon: 'fa-shield-virus' },
                { name: 'Koagülasyon', desc: 'PT, aPTT, INR', done: lab.some(l => l.testType === 'Koagülasyon'), icon: 'fa-syringe' },
                { name: 'Biyokimya', desc: 'Glukoz, Üre, Kreatinin', done: lab.some(l => l.testType === 'Biyokimya'), icon: 'fa-microscope' },
                { name: 'Genetik Test', desc: 'Karyotip, Y-mikrodeleyon veya diğer', done: dna.length > 0, icon: 'fa-dna' },
            ];

            const missing = checks.filter(c => !c.done);
            if (missing.length === 0) { section.style.display = 'none'; return; }
            section.style.display = 'block';

            grid.innerHTML = checks.map(c => {
                const cls = c.done ? 'done' : 'missing';
                const icon = c.done ? 'fa-check' : 'fa-exclamation';
                return `
                <div class="missing-test-item ${cls}">
                    <div class="test-status-icon"><i class="fas ${icon}"></i></div>
                    <div class="missing-test-info">
                        <div class="name">${c.name}</div>
                        <div class="desc">${c.desc}</div>
                    </div>
                </div>`;
            }).join('');
        }

        // ═══ TEST RESULTS ═══
        function renderTestResults(semen, ivf, lab, dna) {
            let html = '';

            if (semen.length + ivf.length + lab.length + dna.length === 0) {
                html = `<div class="card" style="text-align:center;padding:48px;">
                    <i class="fas fa-clipboard-list" style="font-size:40px;color:var(--text-muted);margin-bottom:14px;opacity:0.4;"></i>
                    <h3 style="color:var(--text-secondary);font-size:15px;">Henüz test sonucu yok</h3>
                    <p style="color:var(--text-muted);font-size:13px;">Sonuçlarınız hazır olduğunda burada görünecek</p>
                </div>`;
                document.getElementById('portalTestResults').innerHTML = html;
                return;
            }

            // Semen Tests
            if (semen.length > 0) {
                html += `<div class="test-result-card">
                    <div class="test-result-header">
                        <div class="test-result-title"><i class="fas fa-vial" style="color:var(--text-white);"></i> Semen Analizi</div>
                        <span class="badge badge-info">${semen.length} test</span>
                    </div>
                    <div class="test-result-body">
                        ${semen.map(t => `
                            <div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border-subtle);">
                                <div style="font-size:11px;color:var(--text-white);font-family:'JetBrains Mono',mono;margin-bottom:8px;">${fmtDate(t.date)}</div>
                                <div class="test-param-row"><span class="test-param-name">Hacim</span><span class="test-param-value" style="color:var(--text-white);">${t.volume || '-'} ml</span></div>
                                <div class="test-param-row"><span class="test-param-name">Konsantrasyon</span><span class="test-param-value" style="color:var(--text-white);">${t.concentration || '-'} M/ml</span></div>
                                <div class="test-param-row"><span class="test-param-name">Motilite</span><span class="test-param-value" style="color:var(--text-white);">${t.progressiveMotility || '-'}%</span></div>
                                <div class="test-param-row"><span class="test-param-name">Morfoloji</span><span class="test-param-value" style="color:var(--text-white);">${t.morphology || '-'}%</span></div>
                                <div class="test-param-row"><span class="test-param-name">Sonuç</span><span class="result-indicator ${t.result === 'Normozoospermi' ? 'result-normal' : 'result-abnormal'}">${t.result || '-'}</span></div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            }

            // Lab Tests
            if (lab.length > 0) {
                lab.forEach(t => {
                    html += `<div class="test-result-card">
                        <div class="test-result-header">
                            <div class="test-result-title"><i class="fas fa-flask" style="color:var(--neon-green);"></i> ${t.testType}</div>
                            <span class="badge ${t.status === 'Sonuçlandı' ? 'badge-success' : 'badge-warning'}">${t.status}</span>
                        </div>
                        <div class="test-result-body">
                            <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">${fmtDate(t.date)}</div>
                            ${t.parameters && t.parameters.length > 0 ? t.parameters.map(p => {
                                const flagColor = p.flag === 'Yüksek' || p.flag === 'Anormal' ? 'var(--neon-pink)' : p.flag === 'Düşük' ? 'var(--neon-orange)' : 'var(--neon-green)';
                                const flagIcon = p.flag === 'Normal' ? '✓' : p.flag === 'Yüksek' ? '↑' : p.flag === 'Düşük' ? '↓' : '⚠';
                                return `<div class="test-param-row">
                                    <div>
                                        <div class="test-param-name">${p.name}</div>
                                        <div class="test-param-ref">${p.refMin !== undefined ? p.refMin : ''} - ${p.refMax !== undefined ? p.refMax : ''} ${p.unit || ''}</div>
                                    </div>
                                    <div style="text-align:right;">
                                        <div class="test-param-value" style="color:${p.flag !== 'Normal' ? flagColor : 'var(--text-white)'};">${p.value || '-'} ${p.unit || ''}</div>
                                        <div style="font-size:10px;color:${flagColor};font-weight:600;">${flagIcon} ${p.flag}</div>
                                    </div>
                                </div>`;
                            }).join('') : '<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:13px;">Sonuçlar bekleniyor...</div>'}
                        </div>
                    </div>`;
                });
            }

            // DNA Tests
            if (dna.length > 0) {
                dna.forEach(t => {
                    html += `<div class="test-result-card">
                        <div class="test-result-header">
                            <div class="test-result-title"><i class="fas fa-dna" style="color:var(--neon-purple);"></i> ${t.testLabel}</div>
                            <span class="badge ${t.overallResult === 'Normal' ? 'badge-success' : 'badge-danger'}">${t.overallResult}</span>
                        </div>
                        <div class="test-result-body">
                            <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">${fmtDate(t.date)} ${t.lab ? '— ' + t.lab : ''}</div>
                            ${t.parameters ? t.parameters.map(p => {
                                const isNormal = p.flag === 'Normal' || p.flag === 'Yok' || p.flag === 'Taşıyıcı Değil';
                                return `<div class="test-param-row">
                                    <div class="test-param-name">${p.name}</div>
                                    <div style="text-align:right;">
                                        <div class="test-param-value" style="color:${!isNormal ? 'var(--neon-pink)' : 'var(--text-white)'};">${p.value} ${p.unit || ''}</div>
                                        <div style="font-size:10px;color:${!isNormal ? 'var(--neon-pink)' : 'var(--neon-green)'};font-weight:600;">${!isNormal ? '⚠ ' + p.flag : '✓ Normal'}</div>
                                    </div>
                                </div>`;
                            }).join('') : ''}
                            ${t.notes ? `<div style="margin-top:12px;padding:10px;background:rgba(0,212,255,0.03);border-radius:8px;font-size:12px;color:var(--text-secondary);"><strong>Not:</strong> ${t.notes}</div>` : ''}
                        </div>
                    </div>`;
                });
            }

            // IVF
            if (ivf.length > 0) {
                html += `<div class="test-result-card">
                    <div class="test-result-header">
                        <div class="test-result-title"><i class="fas fa-baby" style="color:var(--neon-purple);"></i> IVF Siklusları</div>
                        <span class="badge badge-info">${ivf.length} siklus</span>
                    </div>
                    <div class="test-result-body">
                        ${ivf.map(r => `
                            <div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border-subtle);">
                                <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px;">${fmtDate(r.startDate)}</div>
                                <div class="test-param-row"><span class="test-param-name">Protokol</span><span class="test-param-value" style="color:var(--text-white);">${r.protocol}</span></div>
                                <div class="test-param-row"><span class="test-param-name">Yöntem</span><span class="test-param-value" style="color:var(--text-white);">${r.method}</span></div>
                                <div class="test-param-row"><span class="test-param-name">Durum</span><span class="badge badge-info">${r.status}</span></div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            }

            document.getElementById('portalTestResults').innerHTML = html;
        }

        // ═══ TIMELINE ═══
        function renderTimeline(semen, ivf, lab, dna) {
            const section = document.getElementById('timelineSection');
            const container = document.getElementById('portalTimeline');
            const events = [];

            semen.forEach(t => events.push({ date: t.date, text: `Semen Analizi — ${t.result || 'Sonuç bekleniyor'}`, icon: 'fa-vial', color: 'var(--text-white)' }));
            lab.forEach(t => events.push({ date: t.date, text: `${t.testType} — ${t.status}`, icon: 'fa-flask', color: 'var(--neon-green)' }));
            dna.forEach(t => events.push({ date: t.date, text: `${t.testLabel} — ${t.overallResult}`, icon: 'fa-dna', color: 'var(--neon-purple)' }));
            ivf.forEach(t => events.push({ date: t.startDate, text: `IVF ${t.protocol} — ${t.status}`, icon: 'fa-baby', color: 'var(--neon-pink)' }));

            if (events.length === 0) { section.style.display = 'none'; return; }

            events.sort((a, b) => new Date(b.date) - new Date(a.date));
            section.style.display = 'block';

            container.innerHTML = events.map(e => `
                <div class="portal-timeline-item">
                    <div class="portal-timeline-date">${fmtDate(e.date)}</div>
                    <div class="portal-timeline-text"><i class="fas ${e.icon}" style="color:${e.color};margin-right:8px;"></i>${e.text}</div>
                </div>
            `).join('');
        }

        // ═══ QR Scanner ═══
        let portalQrScanner = null;
        function startPortalQRScan() {
            const readerEl = document.getElementById('portal-qr-reader');
            const scanBtn = document.getElementById('portalScanBtn');
            if (typeof Html5Qrcode === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
                script.onload = () => initPortalScanner();
                document.head.appendChild(script);
            } else { initPortalScanner(); }

            function initPortalScanner() {
                readerEl.style.display = 'block';
                scanBtn.style.display = 'none';
                portalQrScanner = new Html5Qrcode('portal-qr-reader');
                portalQrScanner.start(
                    { facingMode: 'environment' },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    async (decodedText) => {
                        portalQrScanner.stop().then(async () => {
                            readerEl.style.display = 'none';
                            scanBtn.style.display = 'block';
                            portalQrScanner = null;
                            try {
                                const url = new URL(decodedText);
                                if (url.hash && url.hash.startsWith('#patient=')) {
                                    const id = decodeURIComponent(url.hash.split('=')[1]);
                                    const db = await getDB();
                                    const patient = db.patients.find(p => p.id === id);
                                    if (patient) { showPatientResults(patient); return; }
                                }
                            } catch (_) {}
                            try {
                                const data = JSON.parse(decodedText);
                                if (data.type === 'labsync_patient' && data.id) {
                                    const db = await getDB();
                                    const patient = db.patients.find(p => p.id === data.id);
                                    if (patient) showPatientResults(patient);
                                    else showPortalError('Hasta bulunamadı.');
                                } else showPortalError('Geçersiz QR kod.');
                            } catch (e) { showPortalError('QR kod okunamadı.'); }
                        });
                    }, () => {}
                ).catch(err => {
                    showPortalError('Kamera erişimi sağlanamadı.');
                    readerEl.style.display = 'none';
                    scanBtn.style.display = 'block';
                });
            }
        }

        // ═══ Auto-Login from URL ═══
        async function checkURLLogin() {
            const hash = window.location.hash;
            if (hash && hash.startsWith('#patient=')) {
                const id = decodeURIComponent(hash.split('=')[1]);
                const db = await getDB();
                const patient = db.patients.find(p => p.id === id);
                if (patient) showPatientResults(patient);
                else showPortalError('Bu QR koda ait hasta bulunamadı.');
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' && document.getElementById('portalLoginContainer').style.display !== 'none') portalLogin();
        });

        document.addEventListener('DOMContentLoaded', checkURLLogin);
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
