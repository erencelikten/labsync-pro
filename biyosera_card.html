<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biyosera | Premium Business Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --bg-color: #050505;
            --card-dark: #0a0c10;
            --card-light: #f4f4f5;
            --neon-blue: #00d4ff;
            --text-dark: #818a91;
            --text-light: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 212, 255, 0.05) 0%, transparent 60%);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-light);
            perspective: 1500px; /* 3D Efekt için */
        }

        .instruction {
            margin-bottom: 40px;
            text-align: center;
            color: var(--text-dark);
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Standard CR80 Business Card Size: 3.375" x 2.125" -> Resized proportionally */
        .card-container {
            width: 600px;
            height: 350px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .card-container:hover {
            transform: rotateY(180deg) scale(1.05); /* Hover yapınca döner ve çok hafif büyür */
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            backface-visibility: hidden; /* Arka tarafın görünmesini engeller */
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.1);
            overflow: hidden;
            display: flex;
            box-sizing: border-box;
        }

        /* --- ÖN YÜZ (Karanlık, sadece logo ve his) --- */
        .card-front {
            background: linear-gradient(135deg, #11141a 0%, #06080b 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            transform: rotateY(0deg);
        }

        .front-logo-container {
            text-align: center;
        }

        .front-logo-container img {
            width: 250px;
            filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.2));
        }

        .aesthetic-line {
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, var(--neon-blue), transparent);
            position: absolute;
            left: 50px;
            opacity: 0.5;
        }

        /* --- ARKA YÜZ (Açık veya Yarı transparan kompleks, bilgiler burada) --- */
        .card-back {
            background: #0f1218;
            border: 1px solid rgba(0, 212, 255, 0.2);
            transform: rotateY(180deg);
            padding: 40px 50px;
            flex-direction: column;
            justify-content: space-between;
        }

        .back-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .personal-info h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .personal-info h2 {
            margin: 5px 0 0 0;
            font-size: 13px;
            color: var(--neon-blue);
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .back-logo img {
            width: 140px;
            opacity: 0.9;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 13px;
            color: var(--text-dark);
            letter-spacing: 1px;
        }

        .icon-box {
            width: 24px;
            height: 24px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--neon-blue);
        }

        .qr-placeholder {
            position: absolute;
            bottom: 40px;
            right: 50px;
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.02);
            border: 1px dashed rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            color: var(--text-dark);
            text-align: center;
        }

        /* Glassmorphism parlama efekti */
        .glass-shine {
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.03) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: shine 6s infinite;
        }

        @keyframes shine {
            0% { left: -150%; }
            50% { left: 200%; }
            100% { left: 200%; }
        }

    </style>
</head>
<body>

    <div class="instruction">Tasarımın arkasını görmek için mouse ile üzerine gel</div>

    <div class="card-container">
        
        <!-- ÖN YÜZ -->
        <div class="card-face card-front">
            <div class="aesthetic-line"></div>
            <div class="glass-shine"></div>
            <div class="front-logo-container">
                <!-- Yerel klasörünüzdeki logonuzu çekiyor -->
                <img src="assets/biyosera_logo_hz.png" alt="Biyosera Logo" onerror="this.src='https://lab-system-pi.vercel.app/assets/biyosera_logo_hz.png'">
            </div>
        </div>

        <!-- ARKA YÜZ -->
        <div class="card-face card-back">
            <div class="glass-shine"></div>
            <div class="back-top">
                <div class="personal-info">
                    <h1>EREN</h1>
                    <h2>Kurucu / CEO</h2>
                </div>
                <div class="back-logo">
                    <img src="assets/biyosera_logo_hz.png" alt="Biyosera" onerror="this.src='https://lab-system-pi.vercel.app/assets/biyosera_logo_hz.png'">
                </div>
            </div>

            <div class="contact-info">
                <div class="contact-item">
                    <div class="icon-box">T</div>
                    +90 5XX XXX XX XX
                </div>
                <div class="contact-item">
                    <div class="icon-box">E</div>
                    eren@biyosera.com
                </div>
                <div class="contact-item">
                    <div class="icon-box">W</div>
                    www.biyosera.com
                </div>
            </div>

            <div class="qr-placeholder">
                QR<br>CODE
            </div>
        </div>

    </div>

</body>
</html>
